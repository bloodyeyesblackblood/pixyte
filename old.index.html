<div class="settings-site-container">
<div class="settings-overview">
<h2>Settings</h2>

<div id="settings-overview-menu">

<div class="settings-container">
<div class="show-settings">

	<div class="profile-pic-container">
		<img id="profile-pic-preview" src="src/img/blank.webp"/>
			<input type="file" accept="image/*" onchange="loadFile(event)" id="upload" hidden/>
			<label for="upload"><img src="src/svg/upload-image-icon.svg"></label>
	</div>

	
	
	<div class="profile-username-container">
	<h3>Username</h3>
	<input id="input-username" type="text" placeholder="ReiWasHere">
	<p>www.pixyte.com/ReiWasHere</p>
	</div>
	
	<div class="profile-bio-container">
	<h3>Bio</h3>
	<textarea id="input-bio" cols="20" rows="5" wrap="hard" maxlength="155"></textarea>
	</div>
	
	<div class="profile-gender-container">
	<h3>Gender</h3>
	<select name="input-website" id="input-website" form="carform">
	<option value="gender_none">None</option>
	<option value="gender_male">Male</option>
	<option value="gender_female">Female</option>
	<option value="gender_non_binary">Non-Binary</option>
	<option value="gender_helicopter">Combat Helicopter</option>
	</select>
	</div>

	<div class="profile-language-container">
	<h3>Language</h3>
	<select name="input-website" id="input-website" form="carform">
	<option value="english">English</option>
	<option value="german">German</option>
	</select>
	</div>
	
		<div class="profile-website-container">
	<h3>Website</h3>
	<input id="input-website" type="text" placeholder="Add a Link to your Website/Social Media/Imprint. ">
	</div>
